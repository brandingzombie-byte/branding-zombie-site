<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Cart body -->
  <path d="M2 3 L4.5 3 L7 15 L18.5 15 L21 6 L6 6"/>
  <!-- Cart grid lines -->
  <line x1="9" y1="6" x2="9.8" y2="15" stroke-width="0.7" opacity="0.35"/>
  <line x1="13" y1="6" x2="13.3" y2="15" stroke-width="0.7" opacity="0.35"/>
  <line x1="6.5" y1="9" x2="20.2" y2="9" stroke-width="0.7" opacity="0.35"/>
  <line x1="7" y1="12" x2="19.5" y2="12" stroke-width="0.7" opacity="0.35"/>
  <!-- Wheels -->
  <circle cx="9" cy="18" r="1.5"/>
  <circle cx="17" cy="18" r="1.5"/>
  <!-- Zombie hand rising from cart (product emerging) -->
  <path d="M13 14.5 L13 9"/>
  <!-- Wrist/forearm -->
  <path d="M11.5 14.5 Q12 10.5 13 9 Q14 7.5 14.5 9.5" stroke-width="1.2"/>
  <!-- Fingers -->
  <path d="M13 9 Q12.5 7 13 6 Q13.5 5 13.8 6.5"/>
  <path d="M13 9 Q13.5 7 14 6.5 Q14.5 6 14.5 7.5"/>
  <path d="M14.5 9.5 Q15 8 15.5 8 Q16 8 15.8 9.5"/>
  <!-- Knuckle dots -->
  <circle cx="13" cy="8" r="0.3" fill="currentColor" stroke="none" opacity="0.5"/>
  <circle cx="14" cy="7.8" r="0.3" fill="currentColor" stroke="none" opacity="0.5"/>
  <!-- Price tag -->
  <path d="M17 4 L21 4 L21 7 L19 8.5 L17 7 Z"/>
  <circle cx="18.5" cy="5.5" r="0.5" fill="#BFFF00" stroke="none"/>
  <!-- Toxic spark above hand -->
  <path d="M12 5.5 L11.5 3.5 L13 4.5 L12.5 2.5" stroke-width="1" stroke="#BFFF00"/>
</svg>
