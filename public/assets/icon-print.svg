<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Input paper tray (top) -->
  <path d="M7 6 L7 3 L17 3 L17 6"/>
  <line x1="9" y1="4.5" x2="15" y2="4.5" stroke-width="0.8" opacity="0.5"/>
  <!-- Printer body -->
  <rect x="3" y="6" width="18" height="8" rx="1.5"/>
  <!-- Feed slot -->
  <line x1="5" y1="10" x2="19" y2="10" stroke-width="0.7" opacity="0.4"/>
  <!-- Roller dots -->
  <circle cx="7.5" cy="8" r="0.6" fill="currentColor" stroke="none" opacity="0.5"/>
  <circle cx="10" cy="8" r="0.6" fill="currentColor" stroke="none" opacity="0.5"/>
  <circle cx="12.5" cy="8" r="0.6" fill="currentColor" stroke="none" opacity="0.5"/>
  <!-- Status light -->
  <circle cx="17.5" cy="8" r="0.8" fill="#BFFF00" stroke="none"/>
  <!-- Output paper emerging -->
  <path d="M8 14 L8 21 L16 21 L16 14"/>
  <!-- Skull watermark on output paper -->
  <circle cx="12" cy="16.5" r="1.5" stroke-width="0.8"/>
  <circle cx="11.3" cy="16.2" r="0.4" stroke-width="0.6"/>
  <circle cx="12.7" cy="16.2" r="0.4" stroke-width="0.6"/>
  <path d="M11 17.5 L11 18 L13 18 L13 17.5" stroke-width="0.7"/>
  <!-- Text lines on paper -->
  <line x1="9.5" y1="19" x2="14.5" y2="19" stroke-width="0.7" opacity="0.4"/>
  <line x1="9.5" y1="20" x2="13" y2="20" stroke-width="0.7" opacity="0.4"/>
</svg>
