<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Central hex node (brain core) -->
  <path d="M12 3 L16.5 5.5 L16.5 10.5 L12 13 L7.5 10.5 L7.5 5.5 Z" stroke-width="1.4"/>
  <!-- Inner brain detail -->
  <path d="M10 7 Q12 6 14 7 Q13 9 12 9 Q11 9 10 7" stroke-width="0.8" opacity="0.7"/>
  <!-- Neural connections -->
  <line x1="12" y1="3" x2="12" y2="1" stroke-width="1"/>
  <line x1="16.5" y1="5.5" x2="19" y2="4.5" stroke-width="1"/>
  <line x1="16.5" y1="10.5" x2="19" y2="11.5" stroke-width="1"/>
  <line x1="12" y1="13" x2="12" y2="15.5" stroke-width="1"/>
  <line x1="7.5" y1="10.5" x2="5" y2="11.5" stroke-width="1"/>
  <line x1="7.5" y1="5.5" x2="5" y2="4.5" stroke-width="1"/>
  <!-- Satellite nodes -->
  <circle cx="12" cy="1" r="0.9"/>
  <circle cx="19.5" cy="4" r="0.9"/>
  <circle cx="19.5" cy="12" r="0.9"/>
  <circle cx="12" cy="16" r="0.9"/>
  <circle cx="4.5" cy="12" r="0.9"/>
  <circle cx="4.5" cy="4" r="0.9"/>
  <!-- Lightning spark in center -->
  <path d="M12.8 5.5 L11.2 8 L12.5 8 L11 10.5" stroke-width="1.3" stroke="#00FFD4"/>
  <!-- Output beam -->
  <path d="M12 16 L11 19 L12.5 18.5 L12 21.5" stroke-width="1.2"/>
  <circle cx="12" cy="22" r="0.6" fill="#00FFD4" stroke="none"/>
</svg>
