<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Three tombstone posts (social cards rising) -->
  <!-- Left tombstone -->
  <path d="M2.5 20 L2.5 11 Q2.5 9 4.5 9 Q6.5 9 6.5 11 L6.5 20"/>
  <line x1="2.5" y1="14" x2="6.5" y2="14" stroke-width="0.7" opacity="0.4"/>
  <!-- R.I.P text on left -->
  <line x1="3.5" y1="11.5" x2="5.5" y2="11.5" stroke-width="0.8" opacity="0.6"/>
  <line x1="3.5" y1="12.5" x2="5.5" y2="12.5" stroke-width="0.8" opacity="0.6"/>
  <!-- Centre tombstone (tallest - featured post) -->
  <path d="M9.5 20 L9.5 8 Q9.5 5.5 12 5.5 Q14.5 5.5 14.5 8 L14.5 20"/>
  <line x1="9.5" y1="13" x2="14.5" y2="13" stroke-width="0.7" opacity="0.4"/>
  <!-- Toxic dot (featured/viral) -->
  <circle cx="12" cy="8" r="0.9" fill="#BFFF00" stroke="none"/>
  <line x1="10.5" y1="10" x2="13.5" y2="10" stroke-width="0.8" opacity="0.6"/>
  <line x1="10.5" y1="11.5" x2="13.5" y2="11.5" stroke-width="0.8" opacity="0.6"/>
  <!-- Right tombstone -->
  <path d="M17.5 20 L17.5 11 Q17.5 9 19.5 9 Q21.5 9 21.5 11 L21.5 20"/>
  <line x1="17.5" y1="14" x2="21.5" y2="14" stroke-width="0.7" opacity="0.4"/>
  <line x1="18.5" y1="11.5" x2="20.5" y2="11.5" stroke-width="0.8" opacity="0.6"/>
  <line x1="18.5" y1="12.5" x2="20.5" y2="12.5" stroke-width="0.8" opacity="0.6"/>
  <!-- Ground line -->
  <path d="M1 21 Q12 22 23 21" stroke-width="1.2"/>
  <!-- Connection sparks between posts -->
  <path d="M6.5 12 Q8 11.5 9.5 12" stroke-width="0.8" stroke="#00FFD4" opacity="0.8"/>
  <path d="M14.5 12 Q16 11.5 17.5 12" stroke-width="0.8" stroke="#00FFD4" opacity="0.8"/>
</svg>
