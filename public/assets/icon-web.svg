<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Monitor body -->
  <rect x="1.5" y="2.5" width="21" height="14" rx="1.5"/>
  <!-- Screen bezel -->
  <rect x="3" y="4" width="18" height="10" rx="0.5" stroke-width="0.8" opacity="0.5"/>
  <!-- Code lines (infected data) -->
  <line x1="4.5" y1="6.5" x2="8.5" y2="6.5" stroke-width="1"/>
  <line x1="4.5" y1="8.5" x2="11" y2="8.5" stroke-width="1"/>
  <line x1="4.5" y1="10.5" x2="7" y2="10.5" stroke-width="1"/>
  <line x1="8" y1="10.5" x2="11" y2="10.5" stroke-width="1"/>
  <line x1="4.5" y1="12.5" x2="9.5" y2="12.5" stroke-width="1"/>
  <!-- Screen crack -->
  <path d="M14.5 4 L13 7 L15.5 7 L13.5 14" stroke-width="1.2" opacity="0.9"/>
  <!-- Toxic glow dot (accent) -->
  <circle cx="19.5" cy="5.5" r="0.8" fill="#BFFF00" stroke="none"/>
  <!-- Stand neck -->
  <path d="M10 16.5 L9.5 20 M14 16.5 L14.5 20"/>
  <!-- Base -->
  <path d="M7 20 L17 20" stroke-width="1.6"/>
  <!-- Bios cursor blink -->
  <rect x="12.5" y="8" width="1.5" height="1" fill="currentColor" stroke="none" opacity="0.6"/>
</svg>
