<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Stylus/pen shaft -->
  <path d="M17.5 2 L21 5.5 L8.5 18 L5 21 L4 20 L7.5 16.5 Z"/>
  <!-- Pen tip detail -->
  <path d="M19.5 3.5 L20.5 4.5" stroke-width="0.8" opacity="0.6"/>
  <!-- Shaft centre line -->
  <line x1="8.5" y1="18" x2="17.5" y2="9" stroke-width="0.7" opacity="0.4"/>
  <!-- Ink drip from tip -->
  <path d="M5 21 Q3.5 22.5 3.5 23.5" stroke-width="1.2"/>
  <path d="M4 20 Q2.5 21.5 3 23 Q3.5 24.5 4.5 23.5 Q5.5 22.5 4 20" stroke-width="0.9"/>
  <!-- Toxic ink drop (filled) -->
  <circle cx="3.8" cy="23" r="0.5" fill="#BFFF00" stroke="none"/>
  <!-- Decorative nib marks -->
  <line x1="10" y1="16.5" x2="11.5" y2="15" stroke-width="0.8" opacity="0.5"/>
  <line x1="11.5" y1="15" x2="13" y2="13.5" stroke-width="0.8" opacity="0.5"/>
  <!-- Skull watermark in path -->
  <circle cx="14.5" cy="9" r="2" stroke-width="0.7" opacity="0.35"/>
  <circle cx="13.7" cy="8.6" r="0.4" stroke-width="0.6" opacity="0.5"/>
  <circle cx="15.3" cy="8.6" r="0.4" stroke-width="0.6" opacity="0.5"/>
  <!-- Spiral flourish (design work) -->
  <path d="M2 16 Q1 14 2.5 13 Q4 12 4.5 13.5 Q5 15 3.5 15.5" stroke-width="1" opacity="0.5"/>
</svg>
